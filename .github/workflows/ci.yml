name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bench
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
      - name: Smoke test against real pgvector
        env:
          PGVB_URL: postgres://postgres:postgres@localhost:5432/bench?sslmode=disable
        run: |
          go run ./cmd/pgvector-bench run \
            --url "$PGVB_URL" \
            --synthetic --rows 2000 --dim 128 \
            --queries 50 --concurrency 1,4 --recall-sample 25 \
            --json > /tmp/out.json
          test -s /tmp/out.json
          # Ensure no projection is fabricated when reference.json is empty.
          jq -e '.projection == null' /tmp/out.json
          # Sanity: recall is in [0,1].
          jq -e '.result.recall.default.recall >= 0 and .result.recall.default.recall <= 1' /tmp/out.json

  release:
    name: release
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
